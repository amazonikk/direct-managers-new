name: Update Google Sheets data

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "data/report.json"
  schedule:
    # GitHub запускає перевірку приблизно кожні 5 хвилин.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direct-managers-data-update
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install parser dependency
        run: npm install --no-audit --no-fund

      - name: Download latest Google Sheets and build report
        run: npm run build:data

      - name: Commit refreshed report to main
        shell: bash
        run: |
          if git diff --quiet -- data/report.json; then
            echo "Google Sheets data has not changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report.json
          git commit -m "Update dashboard data"
          git pull --rebase origin main
          git push origin HEAD:main
